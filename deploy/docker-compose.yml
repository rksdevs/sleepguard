services:
  cloud:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.cloud
    container_name: sleepguard-cloud
    restart: unless-stopped
    # Host Postgres listens on 127.0.0.1:5433 only — bridge IPs cannot reach it.
    # Host networking lets the container use localhost:5433 (same as wow-logs PM2 apps).
    network_mode: host
    env_file:
      - .env
    environment:
      SLEEPGUARD_HTTP_ADDR: ":8090"
      SLEEPGUARD_SNAPSHOT_DIR: /data/snapshots
    volumes:
      - /data/sleepguard/data/snapshots:/data/snapshots
